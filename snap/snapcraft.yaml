name: aurora-awake
base: core24
version: '0.1.0'
summary: Keep your desktop active
description: |
  Aurora Awake prevents your computer from going to sleep by moving
  the mouse cursor at regular intervals. Supports multiple movement
  patterns: line, square, circle, and zigzag.

grade: stable
confinement: strict
icon: src-tauri/icons/128x128.png

apps:
  aurora-awake:
    command: bin/aurora-awake
    extensions: [gnome]
    plugs:
      - x11
      - opengl

parts:
  aurora-awake:
    plugin: nil
    source: .
    override-pull: |
      apt-get install -y rsync
      rsync -a \
        --exclude='src-tauri/target/' \
        --exclude='node_modules/' \
        --exclude='snap/' \
        "${CRAFT_PROJECT_DIR}/" "${CRAFT_PART_SRC}/"
    build-snaps:
      - node/22/stable
      - rustup/latest/stable
    build-packages:
      - libwebkit2gtk-4.1-dev
      - libssl-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - pkg-config
      - build-essential
    override-build: |
      rustup default stable
      npm ci
      npm run tauri build -- --bundles deb
      install -Dm755 src-tauri/target/release/aurora-awake \
        ${CRAFT_PART_INSTALL}/bin/aurora-awake
      install -Dm644 src-tauri/icons/128x128.png \
        ${CRAFT_PART_INSTALL}/meta/gui/icon.png
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
